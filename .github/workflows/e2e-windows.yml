name: E2E — Windows Desktop

on:
  push:
    branches: [ethie/e2e]
    paths:
      - "apps/desktop/**"
      - "apps/bootstrap-installer/**"
      - "apps/shared/**"
      - ".github/workflows/e2e-windows.yml"
  pull_request:
    paths:
      - "apps/desktop/**"
      - "apps/bootstrap-installer/**"
      - "apps/shared/**"
      - ".github/workflows/e2e-windows.yml"
  workflow_dispatch:

concurrency:
  group: e2e-windows-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e:
    runs-on: windows-latest
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: npm

      - name: Install npm dependencies
        run: npm ci

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # stable

      - name: Cache Rust targets
        uses: Swatinem/rust-cache@c106961feec855ef5a58494c5a2a31c9d80429a9 
        with:
          workspaces: apps/bootstrap-installer/src-tauri

      # ── Build the bootstrap installer (Tauri) ──────────────────────
      - name: Build installer
        run: npm run tauri:build
        working-directory: apps/bootstrap-installer

      # ── Build the unpacked Electron app for Playwright ──────────────
      - name: Build desktop app (unpacked)
        run: npm run pack
        working-directory: apps/desktop

      # ── Stage the packaged Electron binary as a downloaded artifact ────
      # Simulate the end-user flow: a user downloads the installer EXE
      # to their Downloads folder and runs it from there.
      - name: Copy Hermes.exe to Downloads as Hermes-Setup.exe
        shell: pwsh
        run: |
          $downloads = [Environment]::GetFolderPath('UserProfile') + '\Downloads'
          New-Item -ItemType Directory -Path $downloads -Force | Out-Null
          Copy-Item -Path "apps/desktop/release/win-unpacked/Hermes.exe" `
            -Destination "$downloads\Hermes-Setup.exe" -Force
          Write-Host "Staged: $downloads\Hermes-Setup.exe"

      # ── Screen recording for debugging ──────────────────────────────
      - name: Start screen recording
        shell: pwsh
        run: |
          Start-Process ffmpeg -ArgumentList "-y -f gdigrab -framerate 15 -i desktop -vcodec libx264 -preset ultrafast recording.mp4" `
            -RedirectStandardOutput ffmpeg.log -RedirectStandardError ffmpeg.err -PassThru |
            ForEach-Object { $_.Id } | Out-File ffmpeg.pid

      # ── Install Hermes Agent via the bootstrap installer ────────────
      # The Tauri installer walks through a GUI flow that drives
      # scripts/install.ps1 to set up the Python backend.  On CI this
      # is best-effort: if the installer can't complete (needs elevation,
      # interactive prompts, etc.) the e2e tests still run using
      # BOOT_FAKE mode which simulates boot without a real backend.
      #
      # TODO(full e2e): once the installer supports silent/headless mode,
      # run it here and remove BOOT_FAKE from the test spec so we exercise
      # the real install→launch path.
      - name: Install Hermes Agent (best-effort)
        shell: pwsh
        continue-on-error: true
        run: |
          $installerExe = Get-ChildItem -Path "apps/bootstrap-installer/src-tauri/target/release/bundle" `
            -Recurse -Filter "*.exe" | Select-Object -First 1 -ExpandProperty FullName
          if ($installerExe) {
            Write-Host "Found installer: $installerExe"
            # Attempt silent install; if it fails the e2e tests fall back to BOOT_FAKE.
            Start-Process -FilePath $installerExe -ArgumentList "/S" -Wait -NoNewWindow -ErrorAction SilentlyContinue
          } else {
            Write-Host "No installer EXE found — e2e will use BOOT_FAKE mode."
          }

      # ── Run Playwright e2e against the built Electron binary ────────
      - name: Launch app and run e2e
        working-directory: apps/desktop
        run: npx playwright test e2e/ --reporter=list

      # ── Teardown & artifacts ────────────────────────────────────────
      - name: Stop screen recording
        if: always()
        shell: pwsh
        run: |
          $pid = Get-Content ffmpeg.pid -ErrorAction SilentlyContinue
          if ($pid) {
            Stop-Process -Id $pid -ErrorAction SilentlyContinue
            Start-Sleep -Seconds 2  # let ffmpeg flush the file
          }

      - name: Upload screen recording
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: screen-recording
          path: recording.mp4
          if-no-files-found: ignore

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: apps/desktop/playwright-report
          if-no-files-found: ignore

      - name: Upload Playwright test results
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-test-results
          path: |
            apps/desktop/test-results
          if-no-files-found: ignore
