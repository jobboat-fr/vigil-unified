        <h1>VIGIL — the AI workspace that thinks before it acts</h1>
        <p>VIGIL is an AI workspace that deliberates before it acts: a multi-advisor AI council, autonomous AI departments, and a human-in-the-loop crypto trade desk, with your finance, CRM, mail and documents in one place. Every trade passes a single-use approval gate and outbound mail is review-then-send, so nothing with consequence happens autonomously.</p>
        <h2>What's inside</h2>
        <ul>
          <li><strong>AI Council &amp; Meeting Room</strong> — CFO, CTO, Legal and Product advisor lenses debate a decision, score it, and a chairman synthesizes a defensible verdict with the dissent surfaced.</li>
          <li><strong>Autonomous AI departments</strong> — support, finance, revenue, lead scouting and legal review, each verified by a deterministic effectiveness check.</li>
          <li><strong>Human-in-the-loop trade desk</strong> — data-grounded forecasts propose trades; every order is human-approved and capped at 5% of NAV. Connect your own broker; keys never leave your account.</li>
          <li><strong>Finance, CRM, Mail, Studio, Vault &amp; Audit</strong> — your books, pipeline, inbox, documents and a tamper-evident audit log, scoped to your account with row-level security.</li>
        </ul>
        <h2>Frequently asked questions</h2>
        <h3>What is VIGIL?</h3>
        <p>VIGIL is an AI workspace that deliberates before it acts. It combines a multi-advisor AI council, autonomous AI departments, and a human-in-the-loop crypto trade desk with your finance, CRM, mail, and documents.</p>
        <h3>How is VIGIL different from a chatbot or AI assistant?</h3>
        <p>VIGIL is built around human-in-the-loop control: every trade passes a single-use approval gate and outbound mail is review-then-send, so nothing with real consequence happens autonomously. It also plans before acting and grounds answers in your own data.</p>
        <h3>What is the AI council?</h3>
        <p>A panel of advisor lenses — CFO, CTO, Legal, and Product — that debate a decision, score it, and have a chairman synthesize a defensible verdict, surfacing the bear case instead of hiding it.</p>
        <h3>Can VIGIL trade crypto automatically?</h3>
        <p>No. VIGIL proposes trades from data-grounded forecasts, but every order is human-approved and capped at 5% of NAV. You connect your own broker and your API keys never leave your account.</p>
        <h3>Is my data private and secure?</h3>
        <p>Yes. Every record is scoped to your account with row-level security, your broker and API keys stay in your account, and a tamper-evident audit log records everything the agent does.</p>
        <h3>What can VIGIL's AI departments do?</h3>
        <p>They run recurring work — support triage, finance reconciliation, revenue follow-ups, lead scouting, and legal review — and each only counts a task as done when it passes a deterministic effectiveness check.</p>
