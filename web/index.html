<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />

    <!-- Primary SEO -->
    <title>VIGIL × WinnyWoo — the AI workspace that thinks before it acts</title>
    <meta
      name="description"
      content="An AI workspace that deliberates before acting: a multi-advisor council, a data-grounded crypto desk, and your finance, CRM, mail and document studio — all human-in-the-loop."
    />
    <meta name="theme-color" content="#0a0a0a" />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://dev.vigil-ai.xyz/" />

    <!-- Open Graph (link previews) -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="VIGIL × WinnyWoo" />
    <meta property="og:title" content="VIGIL × WinnyWoo — the AI workspace that thinks before it acts" />
    <meta
      property="og:description"
      content="A multi-advisor council, a data-grounded crypto desk, and your finance, CRM, mail and document studio — under one human-in-the-loop agent."
    />
    <meta property="og:url" content="https://dev.vigil-ai.xyz/" />
    <meta property="og:image" content="https://dev.vigil-ai.xyz/vigil-mark.svg" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="VIGIL × WinnyWoo — the AI workspace that thinks before it acts" />
    <meta
      name="twitter:description"
      content="A multi-advisor council, a data-grounded crypto desk, and your finance, CRM, mail and document studio — under one human-in-the-loop agent."
    />
    <meta name="twitter:image" content="https://dev.vigil-ai.xyz/vigil-mark.svg" />

    <!-- Structured data: Organization + the product as a SaaS application -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@graph": [
          {
            "@type": "Organization",
            "name": "VIGIL × WinnyWoo",
            "url": "https://dev.vigil-ai.xyz/",
            "logo": "https://dev.vigil-ai.xyz/vigil-mark.svg"
          },
          {
            "@type": "SoftwareApplication",
            "name": "VIGIL × WinnyWoo",
            "applicationCategory": "BusinessApplication",
            "operatingSystem": "Web",
            "description": "An AI workspace that deliberates before acting: a multi-advisor council, a data-grounded crypto desk, and a finance, CRM, mail and document studio — all human-in-the-loop.",
            "offers": { "@type": "Offer", "price": "0", "priceCurrency": "EUR" }
          }
        ]
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
